{% extends "base.html" %}

{% block title %}Enroll Student - Student Tracker{% endblock %}

{% block content %}

    <div class="row mb-4 align-items-center">
        <div class="col">
            <h2 class="mb-0">Enroll a New Student</h2>
            <p class="text-muted">Enter the student's unique roll number and full name</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm" style="max-width: 600px;">
        <div class="card-body p-4">
            <form method="POST">

                <div class="mb-3">
                    <label for="roll_no" class="form-label fw-semibold">Roll Number</label>
                    <input type="text" id="roll_no" name="roll_no" class="form-control" placeholder="e.g. 101" required autofocus>
                </div>

                <div class="mb-4">
                    <label for="name" class="form-label fw-semibold">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Aarav Sharma" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">Enroll Student</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-light px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>

{% endblock %}
