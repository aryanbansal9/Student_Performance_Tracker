{% extends "base.html" %}

{% block title %}Add Student - Student Tracker{% endblock %}

{% block content %}

    <div class="page-header">
        <h1>Add a New Student</h1>
        <p class="subtitle">Enter the student's roll number and name</p>
    </div>

    <div class="form-card">
        <!--
            method="POST" -> when submitted, the browser sends
            this data to app.py's add_student() function as
            request.form.

            We DON'T specify action="" so it submits back to
            the same URL (/add_student) — matching the
            GET/POST pattern in app.py.
        -->
        <form method="POST">

            <div class="form-group">
                <label for="roll_number">Roll Number</label>
                <input
                    type="text"
                    id="roll_number"
                    name="roll_number"
                    placeholder="e.g. 101"
                    required
                    autofocus
                >
                <!--
                    "required" is a browser-level check — it stops
                    an EMPTY form from being submitted at all.
                    But we ALSO check for empty values in
                    database.py, because a user could disable
                    JavaScript or send a request without using
                    the form at all (e.g. via a tool like Postman).

                    Rule of thumb: never trust the browser alone —
                    always validate again on the server.
                -->
            </div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="e.g. Aarav Sharma"
                    required
                >
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Add Student</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
            </div>

        </form>
    </div>

{% endblock %}
